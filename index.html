<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/styles.css">
    <title>Ecommerce</title>
</head>
<body class="container">
    <header class="header">
        <h1>Mi Ecommerce</h1>
    </header>

    <aside class="lat-men">
        <h2 class="lat-men__titulo">Categorías</h2>
        <ul class="lat-men__lista">
            <li>Audio (13)</li>
            <li>Computación (21)</li>
            <li>Wearables (41)</li>
            <li>Smartphones (10)</li>
        </ul>
    </aside>

    <main class="prin-men">
        <section class="productos">
            <article class="tarjeta">
                <img class="tarjeta__img" src="assets/img/airpods.jpg" alt="AirPods">
                <h3 class="tarjeta__nombre">AirPods Pro</h3>
                <p class="tarjeta__precio">249.990</p>
                <button class="tarjeta__btn" type="button">Comprar</button>
            </article>

            <article class="tarjeta">
                <img class="tarjeta__img" src="assets/img/mac.jpg" alt="MacBook">
                <h3 class="tarjeta__nombre">MacBook Air</h3>
                <p class="tarjeta__precio">1.299.990</p>
                <button class="tarjeta__btn" type="button">Comprar</button>
            </article>

            <article class="tarjeta">
                <img class="tarjeta__img" src="assets/img/iphone.jpg" alt="iPhone">
                <h3 class="tarjeta__nombre">iPhone 15</h3>
                <p class="tarjeta__precio">899.990</p>
                <button class="tarjeta__btn" type="button">Comprar</button>
            </article>

            <article class="tarjeta">
                <img class="tarjeta__img" src="assets/img/watch.jpg" alt="Apple Watch">
                <h3 class="tarjeta__nombre">Apple Watch</h3>
                <p class="tarjeta__precio">399.990</p>
                <button class="tarjeta__btn" type="button">Comprar</button>
            </article>
        </section>
    </main>

    <footer class="foot">
        <p>@miecommerce</p>
    </footer>
</body>
</html>
